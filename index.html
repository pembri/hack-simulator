<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Console Manager - VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-slate-900 p-6 rounded-2xl border border-orange-500/30 shadow-lg shadow-orange-500/10">
            <div>
                <h1 class="text-3xl font-black text-orange-500 tracking-tighter">SAI CONSOLE <span class="text-white">MANAGER</span></h1>
                <p class="text-slate-400 text-sm">Status: <span id="authStatus" class="text-red-500 font-bold">Disconnected</span></p>
            </div>
            <div class="mt-4 md:mt-0 text-center md:text-right">
                <p class="text-xs uppercase tracking-widest text-slate-500 mb-1">Jatah Kuota VIP (Daily)</p>
                <div class="flex items-center gap-3">
                    <div class="w-48 h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                        <div id="quotaBar" class="h-full bg-orange-600 transition-all duration-500" style="width: 100%"></div>
                    </div>
                    <span id="quotaCount" class="text-xl font-mono font-bold text-orange-500">200/200</span>
                </div>
            </div>
        </div>

        <div class="mb-8 p-6 bg-slate-900 rounded-2xl border border-slate-800">
            <label class="block text-sm font-bold mb-2 text-orange-400">1. Upload Google Service Account (JSON Key)</label>
            <input type="file" id="jsonInput" accept=".json" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-600 file:text-white hover:file:bg-orange-700 cursor-pointer">
            <p id="fileInfo" class="mt-2 text-xs text-slate-500 italic hidden"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-sm">
            <div class="p-5 bg-slate-900 rounded-2xl border border-slate-800 hover:border-orange-500/50 transition">
                <h3 class="font-bold text-orange-500 mb-3"><i class="fas fa-rocket mr-2"></i>MINTA INDEX (TUNGGAL)</h3>
                <input type="text" id="targetUrl" placeholder="https://web-lo.com/post-baru" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-lg focus:outline-none focus:border-orange-500 mb-3 text-xs">
                <button id="btnIndex" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-lg transition shadow-lg">GAS INDEX</button>
            </div>

            <div class="p-5 bg-slate-900 rounded-2xl border border-slate-800 hover:border-orange-500/50 transition">
                <h3 class="font-bold text-blue-400 mb-3"><i class="fas fa-sitemap mr-2"></i>SITEMAP MASSAL</h3>
                <input type="text" id="sitemapUrl" placeholder="https://web-lo.com/sitemap.xml" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-lg focus:outline-none focus:border-blue-500 mb-3 text-xs">
                <button id="btnSitemap" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition shadow-lg text-xs">SCAN & SUBMIT</button>
            </div>

            <div class="p-5 bg-slate-900 rounded-2xl border border-slate-800 hover:border-red-500/50 transition">
                <h3 class="font-bold text-red-500 mb-3"><i class="fas fa-trash-alt mr-2"></i>HAPUS INDEX</h3>
                <input type="text" id="deleteUrl" placeholder="https://web-lo.com/post-mati" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-lg focus:outline-none focus:border-red-500 mb-3 text-xs">
                <button id="btnDelete" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded-lg transition shadow-lg text-xs">HAPUS DARI GOOGLE</button>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="p-4 bg-slate-800/50 flex justify-between items-center border-b border-slate-700">
                <h2 class="font-bold text-slate-200 tracking-wide uppercase text-sm italic">Data Monitoring & Real-time Inspection</h2>
                <button onclick="clearHistory()" class="text-xs text-red-400 hover:text-red-300 font-bold underline">Bersihkan List</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-950/50 text-slate-500 text-[10px] uppercase tracking-widest">
                            <th class="px-6 py-4">URL Link</th>
                            <th class="px-6 py-4 text-center">API Status</th>
                            <th class="px-6 py-4 text-center">Status Di Google</th>
                            <th class="px-6 py-4 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="indexList" class="divide-y divide-slate-800 text-xs">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loader" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur flex items-center justify-center z-50">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-orange-500 mb-4"></i>
            <p id="loaderText" class="text-sm font-bold text-white">Memproses Data...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
